name: CI

on:
  push:
    branches: [main, HOUSE-KEEPING]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-memray

      - name: Ruff (scoped)
        run: |
          python -m ruff check \
            cerebro/core/deletion.py \
            cerebro/engines/orchestrator.py \
            cerebro/engines/turbo_file_engine.py \
            cerebro/v2/ui/flet_app/main.py \
            cerebro/v2/ui/flet_app/pages/review/delete_flow.py \
            cerebro/v2/ui/flet_app/services/delete_service.py \
            tests/test_deletion_engine.py \
            main.py

      - name: Mypy (scoped)
        run: |
          python -m mypy --follow-imports=skip --ignore-missing-imports main.py

      - name: Pytest
        run: |
          sudo apt-get update && sudo apt-get install -y xvfb
          xvfb-run -a python -m pytest -q

      - name: Runtime smoke
        run: |
          python -c "import main; print('import main OK')"
          python -c "from cerebro.engines.orchestrator import ScanOrchestrator; o=ScanOrchestrator(); assert type(o._engines['files']).__name__ == 'TurboFileEngine'; assert 'files_classic' not in o.get_available_modes(); print('single-entrance invariant OK')"

      - name: Startup time check
        run: |
          START=$(python -c "import time; print(int(time.time() * 1000))")
          python -c "import cerebro"
          END=$(python -c "import time; print(int(time.time() * 1000))")
          ELAPSED=$((END - START))
          echo "cerebro import time: ${ELAPSED}ms"
          if [ "$ELAPSED" -gt 3000 ]; then
            echo "FAIL: import time ${ELAPSED}ms exceeds 3000ms threshold"
            exit 1
          fi
