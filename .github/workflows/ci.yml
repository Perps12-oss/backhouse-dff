name: CI

on:
  push:
    branches: [main, HOUSE-KEEPING]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  flet-compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flet-version: ["0.80.0", "0.84.0"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "flet==${{ matrix.flet-version }}"
          pip install pytest

      - name: Flet compatibility tests
        run: |
          python -c "import flet; print('flet', getattr(__import__('flet.version', fromlist=['version']), 'version', '?'))"
          python -m pytest dev/tests/test_flet_compat.py dev/tests/test_review_media_filter.py dev/tests/test_media_preview.py -q

  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r dev/requirements-ci.txt
          pip install pytest-memray

      - name: pip-audit
        run: pip-audit -r requirements.txt

      - name: Secret pattern scan
        run: |
          python dev/scripts/scan_secrets.py

      - name: Ruff (scoped)
        run: |
          python -m ruff check \
            cerebro/core/safety/deletion_gate.py \
            cerebro/core/session.py \
            cerebro/core/pipeline.py \
            cerebro/core/preview.py \
            cerebro/engines/orchestrator.py \
            cerebro/engines/turbo_file_engine.py \
            cerebro/engines/base_engine.py \
            cerebro/v2/ui/flet_app/services/ui_marshal.py \
            cerebro/v2/persistence/results_store.py \
            cerebro/v2/ui/flet_app/pages/review_flow/host.py \
            cerebro/v2/ui/flet_app/pages/review_flow/apply_sheet.py \
            dev/tests/test_deletion_gate.py \
            dev/tests/test_session_tokens.py \
            dev/tests/test_deletion_engine.py \
            dev/tests/test_deletion_gate_integration.py \
            dev/tests/test_preview_manager.py \
            main.py

      - name: Mypy (scoped)
        run: |
          python -m mypy --follow-imports=skip --ignore-missing-imports main.py
          python -m mypy --follow-imports=skip --ignore-missing-imports cerebro/engines/orchestrator.py cerebro/v2/coordinator.py

      - name: Pytest
        run: |
          sudo apt-get update && sudo apt-get install -y xvfb
          xvfb-run -a python -m pytest -m "not slow" -q

      - name: Coverage (safety modules)
        run: |
          python -m pytest dev/tests/test_deletion_gate.py dev/tests/test_deletion_gate_integration.py \
            dev/tests/test_orchestrator_engine_lifecycle.py dev/tests/test_ui_marshal.py \
            --cov=cerebro/core/safety --cov=cerebro/engines/orchestrator --cov-report=term-missing -q

      - name: Runtime smoke
        run: |
          python -c "import main; print('import main OK')"
          # Post-v1 audit Cut 3 invariant: only "files" is registered for file
          # scans. "files_classic" (FileDedupEngine) was removed. Assert both.
          python -c "from cerebro.engines.orchestrator import ScanOrchestrator; o=ScanOrchestrator(); assert type(o._engines['files']).__name__ == 'TurboFileEngine'; assert 'files_classic' not in o.get_available_modes(); print('single-entrance invariant OK')"

      - name: Startup time check
        run: |
          START=$(python -c "import time; print(int(time.time() * 1000))")
          python -c "import cerebro"
          END=$(python -c "import time; print(int(time.time() * 1000))")
          ELAPSED=$((END - START))
          echo "cerebro import time: ${ELAPSED}ms"
          if [ "$ELAPSED" -gt 3000 ]; then
            echo "FAIL: import time ${ELAPSED}ms exceeds 3000ms threshold"
            exit 1
          fi

      - name: Memory bounds
        run: |
          xvfb-run -a python -m pytest dev/tests/test_memory_bounds.py -v --memray --memray-bin-path=/tmp/memray-bounds.bin

  windows-smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Windows smoke tests
        run: |
          python -m pytest dev/tests/test_deletion_gate.py dev/tests/test_deletion_gate_integration.py `
            dev/tests/test_directory_deletion_flag.py dev/tests/test_session_schema_validation.py `
            dev/tests/test_ui_marshal.py dev/tests/test_engine_pause_contract.py `
            dev/tests/test_trash_pipeline_validation.py dev/tests/test_hash_cache_sqlite_int.py -q
