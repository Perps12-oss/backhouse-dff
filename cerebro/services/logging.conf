# CEREBRO logging configuration
#
# This file is loaded by cerebro.services.logger when CEREBRO_LOG_CONF
# points to its path, allowing runtime log-level changes without code edits.
#
# Usage:
#   CEREBRO_LOG_CONF=/path/to/logging.conf python main.py
#
# Hierarchy reminder:
#   "cerebro"                — root of all cerebro loggers
#   "cerebro.services.*"     — config, hash_cache, logger
#   "cerebro.engines.*"      — turbo_file_engine, image_dedup_engine, etc.
#   "cerebro.v2.*"           — coordinator, state, UI pages
#   "cerebro.core.*"         — scanners, safety, preview
#   "cerebro.history.*"      — audit store
#
# All children propagate to the "cerebro" root unless explicitly overridden.

[loggers]
keys=root,cerebro,cerebro_engines,cerebro_v2,cerebro_history

[handlers]
keys=consoleHandler,fileHandler

[formatters]
keys=standard,json

[logger_root]
level=WARNING
handlers=consoleHandler

[logger_cerebro]
level=INFO
handlers=consoleHandler,fileHandler
qualname=cerebro
propagate=0

[logger_cerebro_engines]
level=INFO
handlers=
qualname=cerebro.engines
propagate=1

[logger_cerebro_v2]
level=INFO
handlers=
qualname=cerebro.v2
propagate=1

[logger_cerebro_history]
level=DEBUG
handlers=
qualname=cerebro.history
propagate=1

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=standard
args=(sys.stdout,)

[handler_fileHandler]
class=handlers.RotatingFileHandler
level=DEBUG
formatter=standard
args=('%(HOME)s/.cerebro/logs/cerebro.log', 'a', 10485760, 5, 'utf-8')

[formatter_standard]
format=%(asctime)s [%(levelname)s] %(name)s: %(message)s
datefmt=%H:%M:%S

[formatter_json]
class=cerebro.services.logger._JsonFormatter
